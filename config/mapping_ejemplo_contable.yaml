# Plantilla de mapeo GreenClaim — EJEMPLO contable (paso 2/3).
#
# Mapea el archivo CONTABLE de demo `data/contable_ejemplo.csv` (factura mensual).
# Mismos energéticos del núcleo que la plantilla operativa, pero `fuente: contable`.
# Se cruza contra `mapping_ejemplo.yaml` en el paso 3.

empresa: ejemplo_generico

lectura:
  header: 0

identidad:
  fecha: fecha_factura

energeticos:
  - energetico: gas_natural
    tipo: fosil
    unidad: Nm3
    fuente: contable
    columnas: [gas_natural_nm3]

  - energetico: diesel
    tipo: fosil
    unidad: lt
    fuente: contable
    columnas: [diesel_lt]

  - energetico: electricidad_comprada
    tipo: electricidad_red
    unidad: kWh
    fuente: contable
    columnas: [electricidad_kwh]
